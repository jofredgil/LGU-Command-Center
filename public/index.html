<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGU Emergency Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #1B93BB; border-radius: 3px; }
        
        .blinking-border { animation: blinkingBorder 1.5s infinite; }
        @keyframes blinkingBorder {
            0% { border-color: #374151; }
            50% { border-color: #ef4444; } 
            100% { border-color: #374151; }
        }
        
        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease-out;
        }

        /* Dash animation for the tracking line */
        .dash-line { animation: dash 20s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -1000; } }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen w-screen flex flex-col font-sans overflow-hidden">

    <div id="loginOverlay" class="fixed inset-0 bg-gray-900 z-50 flex items-center justify-center flex-col">
        <h1 class="text-3xl font-extrabold tracking-widest text-white mb-6">MDRRMO <span class="text-[#BB441B]">HQ LOGIN</span></h1>
        <div class="bg-[#111827] p-8 rounded-lg border-2 border-[#1B93BB] shadow-2xl text-center w-96">
            <p class="text-gray-400 text-sm mb-6 tracking-wide">AUTHORIZED DISPATCHERS ONLY</p>
            <input type="password" id="adminPinInput" placeholder="Enter Admin PIN" class="w-full bg-gray-800 text-white border border-gray-600 rounded p-3 mb-4 text-center tracking-widest focus:outline-none focus:border-[#1B93BB]">
            <button onclick="checkPin()" class="w-full bg-[#1B93BB] hover:bg-[#40BAE3] text-white font-bold py-3 rounded transition-colors tracking-widest">ACCESS TERMINAL</button>
            <p id="pinError" class="text-red-500 mt-4 text-sm font-bold hidden">ACCESS DENIED. INVALID PIN.</p>
        </div>
    </div>

    <div id="imageModal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4 cursor-zoom-out transition-opacity duration-300" onclick="closeImageModal()">
        <img id="modalImage" src="" class="max-w-full max-h-full rounded-lg shadow-2xl cursor-default" onclick="event.stopPropagation()">
        <button class="absolute top-6 right-6 text-white hover:text-red-500 text-4xl font-bold cursor-pointer transition-colors" onclick="closeImageModal()">&times;</button>
    </div>

    <audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" preload="auto"></audio>

    <header class="bg-[#111827] p-4 shadow-lg flex justify-between items-center border-b-[3px] border-[#1B93BB] z-20">
        <div class="flex items-center gap-4">
            <div class="w-3 h-3 bg-red-500 rounded-full animate-ping"></div>
            <h1 class="text-2xl font-extrabold tracking-widest text-white">
                MDRRMO <span class="text-[#BB441B]">COMMAND CENTER</span>
            </h1>
            <div id="connection-status" class="text-sm font-bold ml-4 tracking-wide text-gray-500 transition-opacity duration-500">
                Connecting...
            </div>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-[#83D2ED] text-sm font-semibold tracking-wider">SYSTEM ACTIVE</div>
            <button onclick="logoutAdmin()" class="bg-gray-800 hover:bg-red-600 text-xs text-white px-3 py-1 rounded border border-gray-600 transition-colors">LOGOUT</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <div class="flex-1 relative z-0">
            <div id="map" class="absolute inset-0"></div>
        </div>
        
        <div class="w-[450px] bg-gray-900 border-l border-[#1B93BB] flex flex-col z-10 shadow-2xl">
            
            <div class="flex bg-[#111827] border-b border-[#1B93BB]">
                <button id="btn-tab-live" onclick="switchTab('tab-live')" class="tab-btn flex-1 py-4 text-sm font-bold tracking-wider text-[#E36940] border-b-2 border-[#E36940] hover:bg-gray-800 transition-colors">
                    LIVE FEED
                </button>
                <button id="btn-tab-history" onclick="switchTab('tab-history')" class="tab-btn flex-1 py-4 text-sm font-bold tracking-wider text-gray-400 border-b-2 border-transparent hover:bg-gray-800 transition-colors">
                    HISTORY
                </button>
                <button id="btn-tab-users" onclick="switchTab('tab-users')" class="tab-btn flex-1 py-4 text-sm font-bold tracking-wider text-gray-400 border-b-2 border-transparent hover:bg-gray-800 transition-colors">
                    USERS
                </button>
            </div>

            <div class="flex-1 overflow-y-auto relative bg-gray-900 p-4">
                <div id="tab-live" class="tab-content space-y-3"></div>
                <div id="tab-history" class="tab-content space-y-2 hidden"></div>
                <div id="tab-users" class="tab-content space-y-2 hidden"></div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // LOGIN LOGIC
        const ADMIN_PIN = "1234"; 

        window.checkPin = function() {
            const pin = document.getElementById('adminPinInput').value;
            if(pin === ADMIN_PIN) {
                document.getElementById('loginOverlay').classList.add('hidden');
            } else {
                document.getElementById('pinError').classList.remove('hidden');
            }
        };

        window.logoutAdmin = function() {
            document.getElementById('adminPinInput').value = "";
            document.getElementById('pinError').classList.add('hidden');
            document.getElementById('loginOverlay').classList.remove('hidden');
        };

        document.getElementById("adminPinInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") checkPin();
        });

        // 🚨 API KEY 🚨
        const firebaseConfig = {
            apiKey: "AIzaSyB-kcWQ8W29ZXpfZETyE_9s0sEVBhB_mYw", 
            authDomain: "lgu-emergency-dispatch.firebaseapp.com",
            projectId: "lgu-emergency-dispatch",
            storageBucket: "lgu-emergency-dispatch.firebasestorage.app",
            messagingSenderId: "935534672454",
            appId: "1:935534672454:web:11b086134b286a16872847"
        };

        // MODAL CONTROLLERS
        window.openImageModal = function(base64Data) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modalImg.src = "data:image/jpeg;base64," + base64Data;
            modal.classList.remove('hidden');
        };

        window.closeImageModal = function() {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.classList.add('hidden');
            setTimeout(() => { modalImg.src = ""; }, 300); 
        };

        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") closeImageModal();
        });


        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('border-[#E36940]', 'text-[#E36940]');
                el.classList.add('border-transparent', 'text-gray-400');
            });

            document.getElementById(tabId).classList.remove('hidden');
            const activeBtn = document.getElementById('btn-' + tabId);
            activeBtn.classList.remove('border-transparent', 'text-gray-400');
            activeBtn.classList.add('border-[#E36940]', 'text-[#E36940]');
        };

        const map = L.map('map', { zoomControl: false }).setView([9.59, 125.69], 10);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        const shadowUrl = 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png';
        const iconBaseParams = { shadowUrl: shadowUrl, iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41] };
        
        const medicalIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png', ...iconBaseParams });
        const fireIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-orange.png', ...iconBaseParams });
        const policeIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', ...iconBaseParams });
        
        const responderIcon = new L.Icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', ...iconBaseParams });

        const activeMarkers = {};            
        const activeResponderMarkers = {};   
        const activePolylines = {};          

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        signInAnonymously(auth).then(() => {
            const statusEl = document.getElementById('connection-status');
            statusEl.innerHTML = '<span class="text-[#40BAE3]">● Securely Connected</span>';
            
            setTimeout(() => {
                statusEl.classList.add('fade-out');
                setTimeout(() => statusEl.style.display = 'none', 500);
            }, 2000);

            // ==========================================
            // NEW: DISPATCH & DISMISS (PRANK) LOGIC
            // ==========================================
            window.dispatchUnit = async function(documentId) {
                try {
                    const emergencyRef = doc(db, "emergencies", documentId);
                    await updateDoc(emergencyRef, { status: "Dispatched" });
                } catch (error) { console.error("Error dispatching: ", error); }
            };

            window.dismissUnit = async function(documentId) {
                try {
                    // Instantly marks it resolved so it clears off the live map
                    const emergencyRef = doc(db, "emergencies", documentId);
                    await updateDoc(emergencyRef, { status: "Resolved", notes: "❌ DISMISSED / VERIFIED AS PRANK" });
                } catch (error) { console.error("Error dismissing: ", error); }
            };

            const alertSound = document.getElementById('alertSound');
            
            const emergenciesRef = collection(db, "emergencies");
            onSnapshot(emergenciesRef, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added" && change.doc.data().status === "Pending") {
                        alertSound.play().catch(e => console.log("Click page to allow sound."));
                        window.switchTab('tab-live');
                    }
                });

                let liveHTML = '';
                let historyArray = []; 
                
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const id = doc.id;
                    
                    let badgeColor = data.type === 'Medical' ? 'bg-blue-600' : (data.type === 'Fire' ? 'bg-orange-600' : 'bg-red-600');
                    let hexColor = data.type === 'Medical' ? '#2563eb' : (data.type === 'Fire' ? '#ea580c' : '#dc2626');
                    let pinIcon = data.type === 'Medical' ? medicalIcon : (data.type === 'Fire' ? fireIcon : policeIcon);
                    
                    if (data.status !== "Resolved") {
                        const timeString = new Date(parseInt(data.timestamp)).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                        if (data.lat && data.lng) {
                            if (!activeMarkers[id]) {
                                const marker = L.marker([data.lat, data.lng], { icon: pinIcon }).addTo(map)
                                    .bindPopup(`<b style="color:${hexColor}">${data.type.toUpperCase()} EMERGENCY</b><br>${data.citizen_id}`);
                                activeMarkers[id] = marker;
                                map.setView([data.lat, data.lng], 13);
                            }
                        }

                        if (data.status === "En Route" && data.responder_lat && data.responder_lng) {
                            if (!activeResponderMarkers[id]) {
                                const rMarker = L.marker([data.responder_lat, data.responder_lng], { icon: responderIcon }).addTo(map)
                                    .bindPopup(`<b style="color:#16A34A">RESPONDER UNIT</b><br>Live GPS Active`);
                                activeResponderMarkers[id] = rMarker;
                            } else {
                                activeResponderMarkers[id].setLatLng([data.responder_lat, data.responder_lng]);
                            }

                            const lineCoords = [[data.lat, data.lng], [data.responder_lat, data.responder_lng]];
                            if (!activePolylines[id]) {
                                activePolylines[id] = L.polyline(lineCoords, {
                                    color: '#16A34A', weight: 3, dashArray: '10, 10', className: 'dash-line'
                                }).addTo(map);
                            } else { activePolylines[id].setLatLngs(lineCoords); }
                        }

                        // ==========================================
                        // NEW: CAD DATA PARSER & SILENT MODE
                        // ==========================================
                        let imageHtmlBlock = '';
                        if (data.image_data && data.image_data.length > 20) {
                            imageHtmlBlock = `
                                <div class="mt-3 border border-gray-700 rounded overflow-hidden">
                                    <img src="data:image/jpeg;base64,${data.image_data}" alt="Scene Photo" 
                                         class="w-full h-40 object-cover cursor-pointer hover:opacity-80 transition-opacity"
                                         onclick="openImageModal('${data.image_data}')" title="Click to expand image">
                                </div>
                            `;
                        }

                        // Check if it's a silent emergency and extract the mobile number
                        let isSilent = false;
                        let cadDataHtml = '';
                        let extractedMobile = ''; 

                        if (data.notes) {
                            isSilent = data.notes.includes("SILENT EMERGENCY");
                            
                            // MAGIC EXTRACTOR: Pulls the 11-digit mobile number right out of the text block
                            let mobileMatch = data.notes.match(/CONTACT:\s*([^\\]+)/);
                            if (mobileMatch && mobileMatch[1]) {
                                extractedMobile = mobileMatch[1].trim();
                            }

                            // Format the raw data strings from Java \\n into HTML line breaks <br>
                            let formattedData = data.notes.replace(/\\n/g, '<br>').replace(/\n/g, '<br>');
                            
                            // Remove the small contact line from the gray box since we are displaying it massively above
                            formattedData = formattedData.replace(/CONTACT:.*?<br>/i, '');
                            
                            // RESTORED: The Gray Terminal Box for the remaining triage data
                            cadDataHtml = `
                                <div class="mt-3 bg-gray-800 border border-gray-600 rounded p-3 text-[11px] font-mono text-gray-300 leading-relaxed overflow-y-auto max-h-48 shadow-inner">
                                    ${formattedData}
                                </div>
                            `;
                        }

                        let silentBanner = isSilent 
                            ? `<div class="bg-red-600 text-white text-[11px] font-bold px-2 py-2 rounded mb-3 animate-pulse text-center tracking-widest border border-red-400 shadow-md">🚨 DO NOT CALL - SILENT EMERGENCY 🚨</div>`
                            : '';

                        // NEW: BIG MOBILE NUMBER BLOCK
                        let numberColor = isSilent ? "text-red-500 opacity-50" : "text-[#40BAE3]";
                        let callLabel = isSilent ? "🚨 DO NOT CALL THIS NUMBER" : "📞 CALL CITIZEN";
                        let mobileDisplayBlock = extractedMobile && extractedMobile !== "N/A"
                            ? `<div class="mt-3 bg-[#0B1120] border border-gray-700 rounded-md p-3 text-center shadow-lg">
                                 <div class="text-[10px] ${isSilent ? 'text-red-500' : 'text-gray-400'} font-bold uppercase tracking-widest">${callLabel}</div>
                                 <div class="text-3xl font-black ${numberColor} tracking-widest mt-1 select-all cursor-pointer" title="Double click to copy">${extractedMobile}</div>
                               </div>`
                            : '';

                        let statusColor = data.status === 'Pending' ? 'text-red-400 animate-pulse' : (data.status === 'En Route' ? 'text-[#40BAE3]' : 'text-green-400');
                        let rowBorder = data.status === 'Pending' ? 'blinking-border border-2' : 'border border-gray-700';
                        
                        // NEW: Dual-Button Triage System
                        let actionButtons = '';
                        if (data.status === 'Pending') {
                            actionButtons = `
                                <div class="flex gap-2 w-full mt-3">
                                    <button onclick="dismissUnit('${id}')" class="flex-1 text-[10px] bg-red-900/40 text-red-400 border border-red-800 px-2 py-2 rounded hover:bg-red-700 hover:text-white font-bold tracking-wider transition-colors">❌ DISMISS / PRANK</button>
                                    <button onclick="dispatchUnit('${id}')" class="flex-1 text-[10px] bg-[#16A34A] text-white border border-[#16A34A] px-2 py-2 rounded hover:bg-green-500 font-bold tracking-wider transition-colors shadow-lg">✅ VERIFIED - DISPATCH</button>
                                </div>
                            `;
                        }

                        liveHTML += `
                            <div class="bg-[#111827] rounded-lg p-4 ${rowBorder} shadow-md transition-all">
                                ${silentBanner}
                                <div class="flex justify-between items-start mb-2">
                                    <span class="${badgeColor} text-white text-[10px] font-bold px-3 py-1 rounded-sm uppercase tracking-widest shadow-sm">${data.type}</span>
                                    <span class="text-[11px] text-[#ED9D83] font-medium">${timeString}</span>
                                </div>
                                <p class="text-sm font-semibold text-gray-200">Caller: <span class="text-[#83D2ED]">${data.citizen_id}</span></p>
                                
                                ${mobileDisplayBlock} <!-- NEW: BIG NUMBER -->
                                ${cadDataHtml} <!-- RESTORED: THE RICH DATA TERMINAL BOX -->
                                ${imageHtmlBlock} 

                                <div class="flex flex-col mt-4 border-t border-gray-700 pt-3">
                                    <span class="text-xs font-extrabold ${statusColor} tracking-wider">STATUS: ${data.status.toUpperCase()}</span>
                                    ${actionButtons}
                                </div>
                            </div>
                        `;
                    } else {
                        if (activeMarkers[id]) { map.removeLayer(activeMarkers[id]); delete activeMarkers[id]; }
                        if (activeResponderMarkers[id]) { map.removeLayer(activeResponderMarkers[id]); delete activeResponderMarkers[id]; }
                        if (activePolylines[id]) { map.removeLayer(activePolylines[id]); delete activePolylines[id]; }

                        historyArray.push(data);
                    }
                });

                document.getElementById('tab-live').innerHTML = liveHTML || `<p class="text-center text-gray-500 mt-10 text-sm">No active emergencies.</p>`;

                historyArray.sort((a, b) => parseInt(b.timestamp) - parseInt(a.timestamp));

                let historyHTML = '';
                historyArray.forEach(data => {
                    const dateObj = new Date(parseInt(data.timestamp));
                    const dateString = dateObj.toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' });
                    const timeString = dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    let hexColor = data.type === 'Medical' ? '#2563eb' : (data.type === 'Fire' ? '#ea580c' : '#dc2626');

                    // Allow history tab to show if it was dismissed as a prank
                    let isDismissed = data.notes && data.notes.includes("DISMISSED");
                    let historyStatus = isDismissed ? `<span class="text-[9px] text-red-500 font-bold tracking-widest block mt-1">LOGGED AS PRANK</span>` : '';

                    historyHTML += `
                        <div class="bg-[#111827] border-l-4 rounded-r-md p-3 flex justify-between items-center mb-2 shadow-sm border border-gray-800" style="border-left-color: ${hexColor}">
                            <div>
                                <span style="color: ${hexColor}" class="text-xs font-bold uppercase tracking-wider mr-2">${data.type}</span>
                                <div class="text-[11px] text-gray-400 mt-1">${data.citizen_id}</div>
                                ${historyStatus}
                            </div>
                            <div class="flex flex-col items-end">
                                <span class="text-[10px] text-gray-500 font-bold tracking-widest uppercase mb-1">${dateString}</span>
                                <span class="text-xs text-[#ED9D83] font-medium">${timeString}</span>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('tab-history').innerHTML = historyHTML || `<p class="text-center text-gray-500 mt-10 text-sm">History log is empty.</p>`;
            });

            const usersRef = collection(db, "users");
            onSnapshot(usersRef, (snapshot) => {
                const usersTab = document.getElementById('tab-users');
                usersTab.innerHTML = ''; 
                
                if (snapshot.empty) {
                    usersTab.innerHTML = `
                        <div class="text-center mt-10 p-6 border border-dashed border-[#1B93BB] rounded-lg">
                            <p class="text-[#83D2ED] font-semibold mb-2">No Users Found</p>
                            <p class="text-sm text-gray-400">Registered citizens will appear here.</p>
                        </div>
                    `;
                    return;
                }

                snapshot.forEach((doc) => {
                    const userData = doc.data();
                    usersTab.innerHTML += `
                        <div class="bg-[#111827] border border-gray-700 rounded-lg p-3 flex justify-between items-center shadow-sm mb-2">
                            <div class="flex flex-col">
                                <span class="text-sm font-bold text-[#83D2ED] tracking-wide">${userData.name || 'Unknown User'}</span>
                                <span class="text-xs text-gray-400 mt-1">${userData.email || 'No email provided'}</span>
                            </div>
                            <span class="text-[10px] bg-[#1B93BB] text-white px-2 py-1 rounded uppercase tracking-widest font-bold">Verified</span>
                        </div>
                    `;
                });
            });

        }).catch((error) => console.error("Auth failed:", error));
    </script>
</body>
</html>
